name: Submit a level to the community library
description: Share a level you built — once approved it appears in the in-game "Community levels" gallery.
title: "[Level] "
labels: ["level-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing a level! **How this works:** fill the form, submit, and once the maintainer
        adds the `approved` label a bot publishes your level to the in-game gallery automatically.

        In the game: **editor → Save tab → Submit to community library** copies your level JSON to the
        clipboard — paste it in the big box below.
  - type: input
    id: level-name
    attributes:
      label: Level name
      description: Shown in the gallery (max 60 characters).
      placeholder: e.g. Canyon Sprint
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: Your name (shown in the gallery)
      placeholder: e.g. Speedy
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: One or two sentences — what is it, what's fun about it? (max 200 characters)
      placeholder: e.g. A twisty banked circuit with a jump over the start line. 3 laps vs 4 rivals.
  - type: textarea
    id: level-json
    attributes:
      label: Level JSON
      description: Usually PRE-FILLED with a compressed BREACHLVL code when you arrive from the game's Submit button — leave it exactly as-is. If it's empty (very large level), paste the level JSON the game copied to your clipboard, or the Export .json file contents.
      render: json
    validations:
      required: true
  - type: checkboxes
    id: rights
    attributes:
      label: Rights
      options:
        - label: I built this level and I'm happy for it to be hosted in the BREACH community library. Any models/sounds it references come from the game's built-in free sources (Poly Pizza, Sketchfab, Poly Haven, Freesound).
          required: true
