# Deploys the game to GitHub Pages via OUR workflow instead of GitHub's canned "pages build and deployment" pipeline.
# Why: gives us a Run-workflow button for manual redeploys and full control over the deploy step.
# REQUIRES: Settings -> Pages -> Source = "GitHub Actions".
name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false   # QUEUE, never cancel — a cancelled deploy-pages run cancels its Pages deployment record,
                              # which is keyed by COMMIT SHA, poisoning every later attempt to deploy that same commit

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000   # 10 min — the action's allowed maximum (larger values are clamped to this)
